<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TODO ACN</title>
    <style>
        /* Design Violet Pastel */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            background-color: #faf9fe; 
            margin: 0;
            color: #4a4a4a;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(161, 0, 255, 0.05); 
            width: 100%;
            max-width: 420px; 
            margin-top: 20px;
        }

        h2 { text-align: left; margin-bottom: 25px; font-weight: 700; color: #6a1b9a; font-size: 1.6rem; }

        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }

        input { 
            flex-grow: 1; 
            padding: 16px; 
            border: 1.5px solid #f0eafc; 
            border-radius: 16px; 
            outline: none; 
            font-size: 16px; 
            background: #fdfcff; 
            transition: all 0.3s ease; 
        }

        input:focus { border-color: #d1bdfc; background: white; }

        button#addBtn { 
            width: 54px; height: 54px; cursor: pointer; 
            background: #a100ff; color: white; border: none; 
            border-radius: 16px; font-size: 28px; 
            display: flex; align-items: center; justify-content: center; 
        }

        ul { list-style: none; padding: 0; margin: 0; }

        li { 
            background: #ffffff; 
            margin-bottom: 12px; 
            padding: 14px 18px; 
            border: 1px solid #f0eafc; 
            border-radius: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 16px; 
            color: #555; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }

        /* Style pour la zone de texte (ne fait rien au clic maintenant) */
        .task-text {
            flex-grow: 1;
            padding-right: 10px;
        }

        /* Style pour le bouton de suppression (la croix) */
        .delete-btn {
            cursor: pointer;
            font-size: 14px;
            color: #a100ff;
            background: #f5efff;
            width: 32px; /* Un peu plus large pour le doigt */
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .delete-btn:active {
            background: #ff3b30;
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>TODO</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Nouvelle tâche..." autocomplete="off">
        <button id="addBtn" onclick="addTask()">+</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com.rproxy.goskope.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com.rproxy.goskope.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB1XfH0aY3CnUDAjA7Ll3VaFSYjqk0gcxo",
    authDomain: "todolist-93c54.firebaseapp.com",
    databaseURL: "https://todolist-93c54-default-rtdb.firebaseio.com",
    projectId: "todolist-93c54",
    storageBucket: "todolist-93c54.firebasestorage.app",
    messagingSenderId: "944974392488",
    appId: "1:944974392488:web:0dc9a1fb2fb8733f31e69d",
    measurementId: "G-2E81BKPG30"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const tasksRef = ref(db, 'tasks');

  const taskInput = document.getElementById('taskInput');
  const taskList = document.getElementById('taskList');

  onValue(tasksRef, (snapshot) => {
    taskList.innerHTML = "";
    const data = snapshot.val();
    if (data) {
      Object.keys(data).forEach(id => {
        const li = document.createElement('li');
        
        // Création du texte de la tâche
        const spanText = document.createElement('span');
        spanText.className = "task-text";
        spanText.textContent = data[id].text;

        // Création du bouton supprimer (la croix)
        const delBtn = document.createElement('div');
        delBtn.className = "delete-btn";
        delBtn.innerHTML = "✕";
        
        // Seule la croix déclenche la suppression
        delBtn.onclick = () => {
            li.style.opacity = '0';
            li.style.transform = 'scale(0.9)';
            setTimeout(() => {
                remove(ref(db, `tasks/${id}`));
            }, 200);
        };

        li.appendChild(spanText);
        li.appendChild(delBtn);
        taskList.appendChild(li);
      });
    }
  });

  window.addTask = function() {
    const text = taskInput.value.trim();
    if (text !== "") {
      push(tasksRef, { text: text });
      taskInput.value = "";
      taskInput.focus();
    }
  };

  taskInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addTask();
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TODO</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #faf9fe; margin: 0; color: #4a4a4a; overflow-x: hidden; }
        .container { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(161, 0, 255, 0.05); width: 100%; max-width: 420px; margin-top: 20px; }
        h2 { text-align: left; margin-bottom: 25px; font-weight: 700; color: #6a1b9a; font-size: 1.6rem; }
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex-grow: 1; padding: 16px; border: 1.5px solid #f0eafc; border-radius: 16px; outline: none; font-size: 16px; background: #fdfcff; }
        button#addBtn { width: 54px; height: 54px; cursor: pointer; background: #a100ff; color: white; border: none; border-radius: 16px; font-size: 28px; display: flex; align-items: center; justify-content: center; }
        
        ul { list-style: none; padding: 0; margin: 0; }

        li { 
            background: #ffffff; 
            margin-bottom: 12px; 
            padding: 14px 18px; 
            border: 1px solid #f0eafc; 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            font-size: 16px; 
            color: #555; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.2s ease, opacity 0.2s ease;
            position: relative;
            touch-action: pan-y;
        }

        .handle { color: #d1bdfc; margin-right: 15px; font-size: 18px; user-select: none; cursor: move; padding: 5px; display: flex; align-items: center; }
        .sortable-ghost { opacity: 0.4; background: #f0eafc !important; }
        .sortable-chosen { cursor: grabbing !important; box-shadow: 0 10px 25px rgba(161, 0, 255, 0.15); }

        .task-text { flex-grow: 1; white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word; cursor: pointer; min-height: 24px; }

        .delete-btn {
            cursor: pointer; font-size: 14px; color: #a100ff; background: #f5efff;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; flex-shrink: 0; margin-left: 10px; z-index: 10;
        }

        .edit-input { width: 100%; border: none; background: #f0eafc; font-family: inherit; font-size: inherit; color: #4a4a4a; padding: 2px 5px; border-radius: 4px; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>TODO</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Nouvelle tâche..." autocomplete="off">
        <button id="addBtn" onclick="addTask()">+</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com.rproxy.goskope.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, set, query, orderByChild } from "https://www.gstatic.com.rproxy.goskope.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB1XfH0aY3CnUDAjA7Ll3VaFSYjqk0gcxo",
    authDomain: "todolist-93c54.firebaseapp.com",
    databaseURL: "https://todolist-93c54-default-rtdb.firebaseio.com",
    projectId: "todolist-93c54",
    storageBucket: "todolist-93c54.firebasestorage.app",
    messagingSenderId: "944974392488",
    appId: "1:944974392488:web:0dc9a1fb2fb8733f31e69d",
    measurementId: "G-2E81BKPG30"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const tasksRef = ref(db, 'tasks');
  const taskList = document.getElementById('taskList');
  const taskInput = document.getElementById('taskInput');

  Sortable.create(taskList, {
    animation: 150,
    handle: '.handle',
    ghostClass: 'sortable-ghost',
    onEnd: function() { saveNewOrder(); }
  });

  const tasksQuery = query(tasksRef, orderByChild('order'));

  onValue(tasksQuery, (snapshot) => {
    if (document.querySelector('.sortable-chosen')) return;
    taskList.innerHTML = "";
    snapshot.forEach((childSnapshot) => {
        renderTask(childSnapshot.key, childSnapshot.val().text);
    });
  });

  function renderTask(id, text) {
    const li = document.createElement('li');
    li.dataset.id = id;
    li.innerHTML = `
        <div class="handle">⋮⋮</div>
        <span class="task-text">${text}</span>
        <div class="delete-btn" onclick="deleteTask('${id}')">✕</div>
    `;

    const spanText = li.querySelector('.task-text');

    // MODIFICATION AU CLIC
    spanText.onclick = (e) => {
        e.stopPropagation();
        const currentText = spanText.textContent;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'edit-input';
        input.value = currentText;
        
        spanText.innerHTML = '';
        spanText.appendChild(input);
        input.focus();

        const saveEdit = () => {
            const newText = input.value.trim();
            if (newText !== "" && newText !== currentText) {
                set(ref(db, `tasks/${id}/text`), newText);
            } else {
                spanText.textContent = currentText;
            }
        };

        input.onkeydown = (ev) => { if (ev.key === 'Enter') saveEdit(); };
        input.onblur = saveEdit;
    };

    // SWIPE SECURISE
    let startX = 0;
    let isSwiping = false;

    li.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        li.style.transition = 'none';
    }, {passive: true});

    li.addEventListener('touchmove', (e) => {
        let currentX = e.touches[0].clientX;
        let diff = currentX - startX;
        
        // On ne déclenche le swipe que si on dépasse 10px de mouvement
        if (Math.abs(diff) > 10) {
            isSwiping = true;
            li.style.transform = `translateX(${diff}px)`;
            li.style.opacity = 1 - (Math.abs(diff) / 300);
        }
    }, {passive: true});

    li.addEventListener('touchend', (e) => {
        li.style.transition = 'all 0.3s ease';
        let endX = e.changedTouches[0].clientX;
        let diff = endX - startX;

        if (isSwiping && Math.abs(diff) > 100) { 
            const direction = diff > 0 ? '150%' : '-150%';
            li.style.transform = `translateX(${direction})`;
            li.style.opacity = '0';
            setTimeout(() => deleteTask(id), 300);
        } else {
            li.style.transform = 'translateX(0)';
            li.style.opacity = '1';
        }
        isSwiping = false;
    });

    taskList.appendChild(li);
  }

  function saveNewOrder() {
    const updates = {};
    document.querySelectorAll('#taskList li').forEach((li, index) => {
        const id = li.dataset.id;
        const text = li.querySelector('.task-text').textContent;
        updates[id] = { text: text, order: index };
    });
    set(tasksRef, updates);
  }

window.addTask = function() {
    const text = taskInput.value.trim();
    if (text !== "") {
        // On récupère toutes les tâches actuelles pour compter
        const currentTasks = document.querySelectorAll('#taskList li');
        let nextOrder = 0;

        if (currentTasks.length > 0) {
            // On prend l'ordre de la dernière tâche et on ajoute 1
            // C'est plus sûr que de juste compter la longueur
            nextOrder = currentTasks.length;
        }

        push(tasksRef, { 
            text: text, 
            order: nextOrder 
        });
        
        taskInput.value = "";
        taskInput.focus();
    }
};

  window.deleteTask = function(id) {
    remove(ref(db, `tasks/${id}`));
  };

  taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
</script>
</body>
</html>
